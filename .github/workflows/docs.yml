name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Generate PDF from print page
        run: |
          python -m http.server 8000 --directory site &
          SERVER_PID=$!
          sleep 3
          node -e "const { chromium } = require('playwright'); (async()=>{ const browser = await chromium.launch({headless:true}); const page = await browser.newPage(); await page.goto('http://127.0.0.1:8000/print_page/', {waitUntil:'networkidle'}); await page.pdf({ path:'project-documentation.pdf', format:'A4', printBackground:true, margin:{top:'18mm',right:'12mm',bottom:'18mm',left:'12mm'} }); await browser.close(); })();"
          kill $SERVER_PID

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-documentation-pdf
          path: project-documentation.pdf
